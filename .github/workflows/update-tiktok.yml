name: Update TikTok Ads Data

on:
  schedule:
    - cron: '*/15 * * * *'   # a cada 15 minutos
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Update Meta Ads Data"
      - "Update Google Ads Data"
    types: [completed]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run TikTok Ads update script
        env:
          TT_ACCESS_TOKEN:  ${{ secrets.TT_ACCESS_TOKEN }}
          TT_ADVERTISER_ID: ${{ secrets.TT_ADVERTISER_ID }}
        run: python update-tiktok-ads.py

      - name: Commit tiktok-data.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add tiktok-data.json
          git diff --staged --quiet || git commit -m "chore: update tiktok-data.json [skip ci]"
          git pull --rebase origin main || true
          git push
