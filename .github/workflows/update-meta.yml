name: Update Meta Ads Data

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Meta Ads update script
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          META_ACCT:  'act_2044706169171045'
        run: python update-meta-ads.py

      - name: Run Meta Creatives update script
        continue-on-error: true
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          META_ACCT:  'act_2044706169171045'
        run: python update-meta-creatives.py

      - name: Commit meta data files
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          [ -f meta-data.json ] && git add meta-data.json || true
          [ -f meta-creatives-data.json ] && git add meta-creatives-data.json || true
          git diff --staged --quiet || git commit -m "chore: update meta data [skip ci]"
          git pull --rebase origin main || true
          git push
