name: Update Ticketmaster Data

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Update Google Ads Data"
      - "Update Meta Ads Data"
      - "Update GA4 Data"
    types: [completed]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Ticketmaster update script
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: python update-ticketmaster.py

      - name: Commit ticketmaster-data.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add ticketmaster-data.json
          git diff --staged --quiet || git commit -m "chore: update ticketmaster-data.json [skip ci]"
          git pull --rebase origin main || true
          git push
