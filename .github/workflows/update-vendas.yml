name: Update Vendas Proprias

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run vendas update script
        run: python update-vendas-proprias.py

      - name: Commit vendas-data.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add vendas-data.json
          git diff --staged --quiet || git commit -m "chore: update vendas-data.json [skip ci]"
          git pull --rebase origin main || true
          git push
