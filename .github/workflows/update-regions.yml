name: Update Regions Data

on:
  schedule:
    - cron: '7-59/30 * * * *'  # a cada 30min (offset +7 pra evitar colisao)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Run update script
        env:
          META_TOKEN:                   ${{ secrets.META_TOKEN }}
          META_ACCT:                    ${{ secrets.META_ACCT }}
          GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:         ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:     ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:     ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID:       ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: python update-regions.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add regions-data.json
          if git diff --staged --quiet; then
            echo "Sem mudancas em regions-data.json"
            exit 0
          fi
          git commit -m "chore: update regions-data.json [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 || git rebase --abort 2>/dev/null || true
            if git push 2>&1; then
              echo "Push OK na tentativa $attempt"
              exit 0
            fi
            sleep $((RANDOM % 10 + 5))
          done
          exit 1
